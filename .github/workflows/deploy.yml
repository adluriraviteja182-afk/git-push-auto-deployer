name: Deploy to Kubernetes

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy'
        required: false
        default: 'latest'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > ~/.kube/config

      - name: Deploy with kubectl
        run: |
          kubectl set image deployment/git-auto-deployer \
            app=${{ secrets.DOCKER_USERNAME }}/git-auto-deployer:${{ github.event.inputs.image_tag }} \
            -n production

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/git-auto-deployer \
            -n production --timeout=120s