name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          cd app
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd app
          pytest test_main.py -v --tb=short

      - name: Notify success
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"✅ Tests PASSED on ${{ github.ref }} by ${{ github.actor }}"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify failure
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"❌ Tests FAILED on ${{ github.ref }} by ${{ github.actor }}"}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}